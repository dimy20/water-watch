services:
  config1:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_config1
    hostname: config1
    command: mongod --configsvr --replSet configReplSet --port 27017 --dbpath /data/db
    volumes:
      - config1_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  config2:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_config2
    hostname: config2
    command: mongod --configsvr --replSet configReplSet --port 27017 --dbpath /data/db
    volumes:
      - config2_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  config3:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_config3
    hostname: config3
    command: mongod --configsvr --replSet configReplSet --port 27017 --dbpath /data/db
    volumes:
      - config3_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  # ===========================================
  # SHARD 1 REPLICA SET
  # ===========================================
  shard1_replica1:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_shard1_replica1
    hostname: shard1_replica1
    command: mongod --shardsvr --replSet shard1ReplSet --port 27017 --dbpath /data/db
    volumes:
      - shard1_replica1_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  shard1_replica2:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_shard1_replica2
    hostname: shard1_replica2
    command: mongod --shardsvr --replSet shard1ReplSet --port 27017 --dbpath /data/db
    volumes:
      - shard1_replica2_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  shard1_replica3:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_shard1_replica3
    hostname: shard1_replica3
    command: mongod --shardsvr --replSet shard1ReplSet --port 27017 --dbpath /data/db
    volumes:
      - shard1_replica3_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  # ===========================================
  # SHARD 2 REPLICA SET
  # ===========================================
  shard2_replica1:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_shard2_replica1
    hostname: shard2_replica1
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --dbpath /data/db
    volumes:
      - shard2_replica1_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  shard2_replica2:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_shard2_replica2
    hostname: shard2_replica2
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --dbpath /data/db
    volumes:
      - shard2_replica2_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  shard2_replica3:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_shard2_replica3
    hostname: shard2_replica3
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --dbpath /data/db
    volumes:
      - shard2_replica3_data:/data/db
    networks:
      - water_watch_cluster
    restart: unless-stopped

  # ===========================================
  # MONGOS ROUTER
  # ===========================================
  mongos:
    image: mongodb/mongodb-community-server:latest
    container_name: water_watch_mongos
    hostname: mongos
    command: mongos --configdb configReplSet/config1:27017,config2:27017,config3:27017 --port 27017 --bind_ip 0.0.0.0
    ports:
      - "32888:27017"
    networks:
      - water_watch_cluster
    depends_on:
      - config1
      - config2
      - config3
      - shard1_replica1
      - shard2_replica1
    restart: unless-stopped

volumes:
  # Config server data
  config1_data:
  config2_data:
  config3_data:

  # Shard 1 replica set data
  shard1_replica1_data:
  shard1_replica2_data:
  shard1_replica3_data:

  # Shard 2 replica set data
  shard2_replica1_data:
  shard2_replica2_data:
  shard2_replica3_data:

networks:
  water_watch_cluster:
    driver: bridge